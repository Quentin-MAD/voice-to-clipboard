name: Build TalKing Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Vite app
        run: npm run build

      - name: Package Electron app for Windows
        run: npm run electron:package:win

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          $nsisDir = Join-Path ${env:ProgramFiles(x86)} 'NSIS'
          $makensis = Join-Path $nsisDir 'makensis.exe'
          if (!(Test-Path $makensis)) {
            throw "makensis.exe not found at $makensis"
          }
          Add-Content $env:GITHUB_PATH $nsisDir
          & $makensis /VERSION

      - name: Build NSIS installer
        shell: pwsh
        run: |
          $makensis = Join-Path ${env:ProgramFiles(x86)} 'NSIS\makensis.exe'
          & $makensis electron/installer.nsi
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: TalKing-Windows-Installer
          path: electron-release/TalKing-Setup-*.exe

      - name: Release on GitHub
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: electron-release/TalKing-Setup-*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
